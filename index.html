const SINGLES = QUESTIONS.filter(function(q){return q.type==='单选题';}).sort(function(a,b){return a.num-b.num;});
const MULTIS = QUESTIONS.filter(function(q){return q.type==='多选题';}).sort(function(a,b){return a.num-b.num;});
const JUDGES = QUESTIONS.filter(function(q){return q.type==='判断题';}).sort(function(a,b){return a.num-b.num;});

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function renderBSingle(q){
  var a=q.answer_labels[0],h='<div class="q-card"><div class="q-text"><span class="q-number">'+q.num+'</span><span class="text">'+esc(q.question)+'</span></div><div class="options">';
  for(var o of q.options) h+='<div class="opt-item" data-c="'+(o.label===a)+'" onclick="bPick(this,\''+o.label+'\',\''+a+'\')"><span class="opt-label">'+o.label+'</span><span class="opt-text">'+esc(o.text)+'</span></div>';
  h+='<div class="result-badge" id="br-'+q.num+'"></div></div></div>';return h;
}
function renderBMulti(q){
  var cl=q.answer_labels,h='<div class="q-card"><div class="q-text"><span class="q-number">'+q.num+'</span><span class="text">'+esc(q.question)+'</span></div><div class="options">';
  for(var o of q.options){
    var ck=cl.includes(o.label)?'true':'false';
    h+='<div class="opt-item" data-c="'+ck+'" onclick="bPickMulti(this)"><span class="opt-label">'+o.label+'</span><span class="opt-text">'+esc(o.text)+'</span></div>';
  }
  h+='<div class="result-badge" id="br-'+q.num+'"></div></div></div>';return h;
}
function bPickMulti(el){
  el.classList.toggle('selected');var p=el.parentElement,items=p.querySelectorAll('.opt-item'),b=p.querySelector('.result-badge');
  items.forEach(function(i){i.classList.remove('multi-correct','multi-wrong','multi-missed');});
  var btn=p.querySelector('.btn-multi-submit');
  var hasSelected=Array.from(items).some(function(i){return i.classList.contains('selected');});
  if(hasSelected){
    if(!btn){
      btn=document.createElement('button');btn.className='btn-multi-submit';btn.textContent='确认选择';p.appendChild(btn);
      btn.onclick=function(){
        var cl=[],allCorrect=true,hasWrong=false;
        items.forEach(function(i){
          var sel=i.classList.contains('selected');
          var cor=i.dataset.c==='true';
          if(cor){cl.push(i.querySelector('.opt-label').textContent.trim());}
          if(sel&&cor){i.classList.add('multi-correct');}
          else if(sel&&!cor){i.classList.add('multi-wrong');hasWrong=true;}
          else if(!sel&&cor){i.classList.add('multi-missed');allCorrect=false;}
        });
        var isCorrect=allCorrect&&!hasWrong;
        b.className='result-badge show '+(isCorrect?'correct':'wrong');
        b.innerHTML=isCorrect?'&#10003; 全部正确！':'&#10007; 参考答案：'+esc(cl.join('、'));
        btn.style.display='none';
      };
    }
  }else{
    b.className='result-badge';if(btn){p.removeChild(btn);}
  }
}function renderBJudge(q){
  var a=q.answer_labels[0],h='<div class="q-card"><div class="q-text"><span class="q-number">'+q.num+'</span><span class="text">'+esc(q.question)+'</span></div><div class="options">';
  for(var o of q.options) h+='<div class="opt-item" data-c="'+(o.label===a)+'" onclick="bPick(this,\''+o.text+'\',\''+q.answer+'\')"><span class="opt-label">'+o.label+'</span><span class="opt-text">'+esc(o.text)+'</span></div>';
  h+='<div class="result-badge" id="br-'+q.num+'"></div></div></div>';return h;
}
function bPick(el,sel,cor){
  var p=el.parentElement;p.querySelectorAll('.opt-item').forEach(function(i){i.classList.remove('selected','correct','wrong');});
  el.classList.add('selected');var b=p.querySelector('.result-badge');
  if(sel===cor){el.classList.add('correct');b.className='result-badge show correct';b.innerHTML='&#10003;';}
  else{el.classList.add('wrong');p.querySelectorAll('.opt-item').forEach(function(i){if(i.dataset.c==='true')i.classList.add('correct');});
  b.className='result-badge show wrong';b.innerHTML='&#10007; 正确答案：'+esc(cor);}
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function startExam(){
  var name=document.getElementById('exam-name').value.trim();
  var empid=document.getElementById('exam-empid').value.trim();
  if(!name||!empid){alert('请填写姓名和工号后再开始考试');return;}
  localStorage.setItem('expenseQuizName',name);
  localStorage.setItem('expenseQuizEmpId',empid);
  if(examTimer){clearInterval(examTimer);examTimer=null;}
  timeLeft=900;
  var ps=shuffle([].concat(SINGLES)).slice(0,20);
  var pm=shuffle([].concat(MULTIS)).slice(0,5);
  var pj=shuffle([].concat(JUDGES)).slice(0,20);
  var all=ps.concat(pm).concat(pj);
  examQs=all.map(function(q,i){return Object.assign({},q,{examIdx:i+1});});
  examAs=examQs.map(function(){return{selected:[],submitted:false};});
  document.getElementById('exam-start').style.display='none';
  document.getElementById('exam-result').style.display='none';
  document.getElementById('exam-doing').style.display='block';
  renderQ(0);upProg();
  updateTimerDisplay();
  examTimer=setInterval(timerTick,1000);
}
function timerTick(){
  timeLeft--;
  updateTimerDisplay();
  if(timeLeft<=0){clearInterval(examTimer);examTimer=null;timeLeft=0;forceSubmitExam();}
}
function updateTimerDisplay(){
  var el=document.getElementById('timer-countdown');
  if(!el)return;
  var m=Math.floor(timeLeft/60),s=timeLeft%60;
  el.textContent=m+':'+(s<10?'0':'')+s;
  var td=document.getElementById('timer-display');
  if(td){
    if(timeLeft<=60){td.classList.add('timer-warning','timer-pulse');}
    else if(timeLeft<=180){td.classList.add('timer-warning');td.classList.remove('timer-pulse');}
    else{td.classList.remove('timer-warning','timer-pulse');}
  }
}
function forceSubmitExam(){
  // Mark all questions as submitted (even unanswered ones)
  for(var i=0;i<examAs.length;i++){
    if(!examAs[i].submitted){
      examAs[i].submitted=true;
    }
  }
  finishExam();
}

function renderQ(idx){
  examCur=idx;var q=examQs[idx],a=examAs[idx];
  document.getElementById('current-index-show').textContent=idx+1;
  if(!q.options||q.options.length===0){document.getElementById('exam-question-area').innerHTML='<div class="q-card">数据错误：此题无选项</div>';return;}
  var isM=q.type==='多选题';
  var sec='';
  if(idx<20)sec='<div class="section-badge single">📖 第一部分 · 单选题（1-20）</div>';
  else if(idx<25)sec='<div class="section-badge multi">📖 第二部分 · 多选题（21-25）</div>';
  else sec='<div class="section-badge judge">📖 第三部分 · 判断题（26-45）</div>';
  var h='<div class="q-card">'+sec+'<div class="q-text"><span class="q-number">'+(idx+1)+'</span><span class="text">'+esc(q.question)+'</span>';
  if(a.submitted){var ok=isCor(idx);h+='<span class="answered-label '+(ok?'correct-label':'wrong-label')+'">'+(ok?'&#10003; 正确':'&#10007; 错误')+'</span>';}
  h+='</div><div class="options">';
  for(var o of q.options){
    var cls='opt-item';
    var isSel=a.selected.includes(o.label)||a.selected.includes(o.text);
    if(a.submitted){
      var cl=q.answer_labels,isC=cl.includes(o.label)||cl.includes(o.text);
      if(isC&&isSel)cls+=' multi-correct';else if(!isC&&isSel)cls+=' multi-wrong';else if(isC&&!isSel)cls+=' multi-missed';else cls+=' disabled';
    }else{if(isSel)cls+=' selected';}
    var ch=a.submitted?'':isM?'onclick="ePickM(this,'+idx+')"':'onclick="ePickS(this,'+idx+')"';
    h+='<div class="'+cls+'" '+ch+'><span class="opt-label">'+o.label+'</span><span class="opt-text">'+esc(o.text)+'</span></div>';
  }
  if(!a.submitted&&isM)h+='<button class="btn-submit" onclick="subQ('+idx+')">确认选择</button>';
  if(a.submitted){
    var ct=q.type==='判断题'?q.answer_labels[0]:q.answer_labels.join('、');
    h+='<div class="result-badge show '+(isCor(idx)?'correct':'wrong')+'">'+(isCor(idx)?'&#10003; 回答正确':'&#10007; 正确答案：'+esc(ct))+'</div>';
  }
  h+='</div></div>';
  var nv='<div class="exam-nav">';
  nv+='<button class="btn-prev" onclick="prevQ()" '+(idx===0?'disabled':'')+'>&#9664; 上一题</button>';
  var allD=examAs.every(function(aa){return aa.submitted;});
  if(idx===examQs.length-1){
    nv+='<button class="btn-restart" onclick="finishExam()">交卷 &#10004;</button>';
  }else{nv+='<button class="btn-next" onclick="nextQ()">下一题 &#9654;</button>';}
  nv+='</div>';
  document.getElementById('exam-question-area').innerHTML=h;
  document.getElementById('exam-nav-area').innerHTML=nv;
  upProg();
}

function ePickS(el,idx){
  var p=el.parentElement;
  p.querySelectorAll('.opt-item').forEach(function(i){i.classList.remove('selected');});
  el.classList.add('selected');
  var lb=el.querySelector('.opt-label').textContent.trim();
  examAs[idx].selected=[lb];
  examAs[idx].submitted=true;
  renderQ(idx);
}

function ePickM(el,idx){
  el.classList.toggle('selected');
  var p=el.parentElement,sel=[];
  p.querySelectorAll('.opt-item').forEach(function(i){if(i.classList.contains('selected'))sel.push(i.querySelector('.opt-label').textContent.trim());});
  examAs[idx].selected=sel;
}

function subQ(idx){examAs[idx].submitted=true;renderQ(idx);}
function prevQ(){if(examCur>0)renderQ(examCur-1);}
function nextQ(){if(examCur<examQs.length-1)renderQ(examCur+1);}

function isCor(idx){
  var q=examQs[idx],a=examAs[idx],cl=q.answer_labels;
  return cl.every(function(l){return a.selected.includes(l);})&&a.selected.every(function(l){return cl.includes(l);})&&a.selected.length===cl.length;
}

function upProg(){
  var done=examAs.filter(function(a){return a.submitted;}).length;
  document.getElementById('done-count').textContent=done;
  var bar=document.getElementById('exam-progress'),h='';
  for(var i=0;i<45;i++){
    var cls='progress-dot';
    if(i===examCur)cls+=' current';
    if(examAs[i]&&examAs[i].submitted)cls+=isCor(i)?' answered':' wrong-ans';
    h+='<div class="'+cls+'" onclick="renderQ('+i+')">'+(i+1)+'</div>';
  }
  bar.innerHTML=h;
}

function finishExam(){
  if(examTimer){clearInterval(examTimer);examTimer=null;}
  var total=examQs.length,correct=0,score=0,totalScore=0;
  var sc0=0,mc0=0,jc0=0;
  for(var i=0;i<total;i++){
    if(isCor(i))correct++;
    var q=examQs[i];
    if(q.type==='单选题'){sc0++;if(isCor(i))score+=2;totalScore+=2;}
    else if(q.type==='多选题'){mc0++;if(isCor(i))score+=4;totalScore+=4;}
    else{jc0++;if(isCor(i))score+=2;totalScore+=2;}
  }
  var pct=Math.round(score/totalScore*100);
  var uname=getMyName();
  saveScore(pct,correct,total,sc0,mc0,jc0,uname);
  var h='<div class="score-card"><h2 style="font-size:20px;margin-bottom:4px;">考试结束</h2>';
  h+='<div class="score-circle '+(pct>=60?'pass':'fail')+'">'+pct+'<span style="font-size:14px;">分</span></div>';
  h+='<div class="score-detail">得分 '+score+' / '+totalScore+' 分（单选2分/题 · 多选4分/题 · 判断2分/题）</div>';
  var sc=0,mc=0,jc=0,st=0,mt=0,jt=0;
  for(var i=0;i<examQs.length;i++){
    var q=examQs[i];
    if(q.type==='单选题'){st++;if(isCor(i))sc++;}
    else if(q.type==='多选题'){mt++;if(isCor(i))mc++;}
    else{jt++;if(isCor(i))jc++;}
  }
  h+='<div class="score-detail">单选 '+sc+'/'+st+' | 多选 '+mc+'/'+mt+' | 判断 '+jc+'/'+jt+'</div>';
  h+='<br><button class="btn-start" onclick="showRev()">查看答题详情</button>';
  h+='<button class="btn-leaderboard" onclick="showLeaderboard()" style="margin-top:8px;">🏆 成绩排行榜</button>';
  h+='<button class="btn-restart" onclick="startExam()" style="margin-top:10px;background:linear-gradient(135deg,#1a73e8,#4285f4);">再来一套</button>';
  h+='<button class="btn-restart" onclick="switchMode(\'browse\')" style="margin-top:6px;background:#666;">返回刷题模式</button></div>';
  document.getElementById('exam-doing').style.display='none';
  document.getElementById('exam-result').style.display='block';
  document.getElementById('exam-result').innerHTML=h;
}
function showRev(){document.getElementById('exam-doing').style.display='block';document.getElementById('exam-result').style.display='none';renderQ(0);}

// ======================== 姓名工号管理 ========================
function getMyName(){
  return localStorage.getItem('expenseQuizName')||'匿名用户';
}
function getMyEmpId(){
  return localStorage.getItem('expenseQuizEmpId')||'';
}

// ======================== 排行榜 ========================
function saveScore(sc,correct,total,sc0,mc0,jc0,uname){
  uname=uname||'匿名用户';
  var empid=getMyEmpId();
  var now=new Date();
  var ts=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  // 姓名和工号用分隔符存入name字段（Supabase表无empid列）
  var storeName=uname+'||'+empid;
  fetch(SUPABASE_URL+'/rest/v1/scores',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},
    body:JSON.stringify({name:storeName,score:sc,correct:correct,total:total,sc:sc0,mc:mc0,jc:jc0,time:ts})}).catch(function(){});
}
function parseNameEmp(storeName){
  // 旧格式数据（修复前存的匿名/测试/逗号等）统一标为已清除
  if(!storeName||storeName==='匿名用户'||storeName==='测试'||storeName==='，||，')return {name:'已清除',empid:'-'};
  var parts=storeName.split('||');
  if(parts.length<2||!parts[0]||!parts[1])return {name:'已清除',empid:'-'};
  return {name:parts[0],empid:parts[1]};}
function showLeaderboard(){
  loadLeaderboard();
}
function loadLeaderboard(){
  var h='<div class="score-card"><h2 style="font-size:20px;margin-bottom:10px;">🏆 成绩排行榜</h2><p style="font-size:13px;color:#999;">加载中...</p></div>';
  document.getElementById('exam-start').style.display='none';
  document.getElementById('exam-result').style.display='block';
  document.getElementById('exam-result').innerHTML=h;
  fetch(SUPABASE_URL+'/rest/v1/scores?order=score.desc,correct.desc&limit=100',{headers:{'apikey':SUPABASE_KEY}}).then(function(r){return r.json();}).then(function(lb){
    if(!lb||lb.length===0){
      document.getElementById('exam-result').innerHTML='<div class="score-card"><h2 style="font-size:20px;margin-bottom:10px;">🏆 成绩排行榜</h2><p style="font-size:14px;color:#999;">暂无成绩记录，考完试自动排名！</p><br><button class="btn-start" onclick="document.getElementById(\'exam-start\').style.display=\'block\';document.getElementById(\'exam-result\').style.display=\'none\'">返回</button></div>';
      return;
    }
    // 过滤：只显示有有效姓名和工号的记录
    var valid=lb.filter(function(r){
      var ne=parseNameEmp(r.name);
      return ne.name!=='已清除'&&ne.name!=='匿名'&&ne.name!=='匿名用户'&&ne.empid&&ne.empid!=='-';
    });
    if(valid.length===0){
      document.getElementById('exam-result').innerHTML='<div class="score-card"><h2 style="font-size:20px;margin-bottom:10px;">🏆 成绩排行榜</h2><p style="font-size:14px;color:#999;">暂无有效成绩记录</p><br><button class="btn-start" onclick="document.getElementById(\'exam-start\').style.display=\'block\';document.getElementById(\'exam-result\').style.display=\'none\'">返回</button></div>';
      return;
    }
    var h2='<div class="score-card"><h2 style="font-size:20px;margin-bottom:10px;">🏆 成绩排行榜</h2><p style="font-size:11px;color:#999;">来自所有人的考试记录</p>';
    var myName=getMyName();
    h2+='<div style="margin:10px 0;padding:8px 12px;background:#f0f7ff;border-radius:8px;font-size:13px;"><span>我的姓名: <strong>'+esc(myName)+'</strong>  ·  工号: <strong>'+(getMyEmpId()||'-')+'</strong></span></div>';
    h2+='<table class="lb-table"><tr><th>#</th><th>姓名</th><th>工号</th><th>得分</th><th>正确率</th><th>详细</th><th>时间</th></tr>';
    for(var i=0;i<valid.length;i++){
      var r=valid[i];
      var medal='';
      if(i===0)medal='🥇';else if(i===1)medal='🥈';else if(i===2)medal='🥉';else medal=(i+1);
      var ne=parseNameEmp(r.name);
      h2+='<tr><td>'+medal+'</td><td style="text-align:left;max-width:60px;overflow:hidden;text-overflow:ellipsis;">'+esc(ne.name)+'</td><td style="text-align:left;max-width:60px;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:#555;">'+esc(ne.empid)+'</td><td class="lb-score">'+r.score+'</td><td>'+r.correct+'/'+r.total+'</td><td>单选'+(r.sc||'-')+'多选'+(r.mc||'-')+'判断'+(r.jc||'-')+'</td><td class="lb-time">'+r.time+'</td></tr>';
    }
    h2+='</table>';
    h2+='<br><button class="btn-start" onclick="document.getElementById(\'exam-start\').style.display=\'block\';document.getElementById(\'exam-result\').style.display=\'none\'">返回</button>';
    h2+='<br><button class="btn-clear-lb" onclick="clearLeaderboard()" style="margin-top:6px;">清除记录</button></div>';
    document.getElementById('exam-result').innerHTML=h2;
  }).catch(function(){
    document.getElementById('exam-result').innerHTML='<div class="score-card"><h2 style="font-size:20px;margin-bottom:10px;">🏆 成绩排行榜</h2><p style="font-size:14px;color:#999;">加载失败，请检查网络</p><br><button class="btn-start" onclick="document.getElementById(\'exam-start\').style.display=\'block\';document.getElementById(\'exam-result\').style.display=\'none\'">返回</button></div>';
  });
}
function clearLeaderboard(){
  var pwd=prompt('请输入管理员密码以清除全部成绩记录：');
  if(!pwd||pwd!=='admin888'){alert('❌ 密码错误');return;}
  fetch(SUPABASE_URL+'/rest/v1/scores?id=neq.0',{method:'DELETE',headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'}}).then(function(r){
    if(r.status===200||r.status===204){alert('✅ 已清除全部记录');loadLeaderboard();}
    else{alert('❌ 清除失败，无删除权限');}
  }).catch(function(){alert('❌ 清除失败');});
}
